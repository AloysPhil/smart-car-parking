      <style>
         * {
         margin: 0;
         padding: 0;
         }
         section {
         display: flex;
         justify-content: center;
         align-items: center;
         min-height: 100vh;
         width: 100%;
         background: url('https://images.unsplash.com/photo-1674907534695-e82d5b3ec405?crop=entropy&cs=tinysrgb&fm=jpg&ixid=MnwzMjM4NDZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE2Nzc2MDczOTQ&ixlib=rb-4.0.3&q=80')no-repeat;
         background-position: center;
         background-size: cover;
         }
         section:before {
         content: "";
         background-color: #0009;
         width: 100%;
         height: 100%;
         position: absolute;
         top: 0;
         }
         .form-box {
         display: flex;
         justify-content: center;
         align-items: center;
         position: relative;
         width: 400px;
         height: 450px;
         background: transparent;
         border: 2px solid rgba(255, 255, 255, 0.5);
         border-radius: 20px;
         backdrop-filter: blur(15px);                
         }
         h2 {
         color: #fff;
         text-align: center;
         font-size: 2em;                
         }
         .inputbox {
         position: relative;
         border-bottom: 2px solid #fff;
         margin: 30px 0;
         width: 310px;                
         }
         .inputbox label {
         transform: translateY(-50%);
         color: #fff;
         font-size: 1em;
         pointer-events: none;
         transition: .5s;
         position: absolute;
         top: 50%;
         left: 5px;                
         }
         input:focus~label,
         input:valid~label {
         top: -5px;
         }
         .inputbox input {
         background: transparent;
         border: none;
         outline: none;
         font-size: 1em;
         padding: 0 35px 0 5px;
         color: #fff;
         width: 100%;
         height: 50px;               
         }
         .inputbox ion-icon {
         font-size: 1.2em;
         position: absolute;
         right: 8px;
         color: #fff;                
         top: 20px;
         }
         .forget {
         color: #fff;
         display: flex;
         justify-content: space-between;
         margin: -15px 0 15px;
         font-size: .9em;                
         }
         .forget label {
         color: #fff;
         }
         .forget label input {
         margin-right: 3px;
         }
         .forget label a,
         .forget a {
         color: #fff;
         text-decoration: none;
         }
         .forget label a:hover {
         text-decoration: underline;
         }
         button {
         width: 100%;
         height: 40px;
         border-radius: 40px;
         background: #fff;
         border: none;
         outline: none;
         cursor: pointer;
         font-size: 1em;
         font-weight: 600;
         }
         .register {
         font-size: .9em;
         color: #fff;
         text-align: center;
         margin: 25px 0 10px;
         }
         .register p a {
         text-decoration: none;
         color: #fff;
         font-weight: 600;
         }
         .register p a:hover {
         text-decoration: underline;
         }
         
         .otp-field {
  flex-direction: row;
  column-gap: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.otp-field input {
  height: 45px;
  width: 42px;
  border-radius: 6px;
  outline: none;
  font-size: 1.125rem;
  text-align: center;
  border: 1px solid #ddd;
}
.otp-field input:focus {
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
}
.otp-field input::-webkit-inner-spin-button,
.otp-field input::-webkit-outer-spin-button {
  display: none;
}

.resend {
  font-size: 12px;
}
